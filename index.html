<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Music App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      gap: 10px;
    }

    .song {
      background: #1a1a22;
      padding: 15px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .song:hover {
      background: #2a2a35;
    }

    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      padding: 15px;
      border-top: 1px solid #333;
    }

    audio {
      width: 100%;
    }
  </style>
</head>
<body>

<header>My Music App</header>

<div class="container" id="songList"></div>

<div class="player">
  <div id="nowPlaying">Select a song</div>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
  const supabaseUrl = "YOUR_SUPABASE_URL";
  const supabaseKey = "YOUR_SUPABASE_ANON_KEY";

  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const songList = document.getElementById("songList");
  const audioPlayer = document.getElementById("audioPlayer");
  const nowPlaying = document.getElementById("nowPlaying");

  async function loadSongs() {
    const { data, error } = await supabase
      .from('songs')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      return;
    }

    data.forEach(song => {
      const div = document.createElement('div');
      div.className = 'song';
      div.innerHTML = `<strong>${song.title}</strong><br/><small>${song.artist}</small>`;

      div.onclick = () => {
        audioPlayer.src = song.file_url;
        audioPlayer.play();
        nowPlaying.innerText = `Now Playing: ${song.title}`;
      };

      songList.appendChild(div);
    });
  }

  loadSongs();
</script>

</body>
</html>
